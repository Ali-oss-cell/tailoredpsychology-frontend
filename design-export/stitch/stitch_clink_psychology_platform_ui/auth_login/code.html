<body class="bg-background text-on-background min-h-screen flex flex-col font-manrope">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-stone-900/80 backdrop-blur-md border-b border-[#2A3333]/10 dark:border-white/10 flat no-shadows docked full-width top-0 sticky z-50">
<div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto w-full">
<div class="flex items-center gap-8">
<a class="text-2xl font-bold tracking-tighter text-[#5FA8A6]" href="#">Clink</a>
<nav class="hidden md:flex gap-6">
<!-- Nav items rendered but none active since this is a transactional page -->
<a class="font-manrope font-medium text-sm tracking-tight text-stone-600 dark:text-stone-400 hover:text-[#3E7C7A] transition-colors duration-200" href="#">Find a Psych</a>
<a class="font-manrope font-medium text-sm tracking-tight text-stone-600 dark:text-stone-400 hover:text-[#3E7C7A] transition-colors duration-200" href="#">Services</a>
<a class="font-manrope font-medium text-sm tracking-tight text-stone-600 dark:text-stone-400 hover:text-[#3E7C7A] transition-colors duration-200" href="#">Fees</a>
<a class="font-manrope font-medium text-sm tracking-tight text-stone-600 dark:text-stone-400 hover:text-[#3E7C7A] transition-colors duration-200" href="#">Medicare</a>
<a class="font-manrope font-medium text-sm tracking-tight text-stone-600 dark:text-stone-400 hover:text-[#3E7C7A] transition-colors duration-200" href="#">Resources</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="font-manrope font-medium text-sm tracking-tight text-[#5FA8A6] dark:text-[#8FA7A8] hover:text-[#3E7C7A] transition-colors duration-200">Login</button>
<button class="bg-[#5FA8A6] text-white px-4 py-2 rounded-lg font-manrope font-medium text-sm tracking-tight hover:bg-[#3E7C7A] transition-colors duration-200">Get Matched</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-gutter">
<div class="w-full max-w-md bg-surface-container-lowest rounded-lg p-lg border border-outline-variant/30 shadow-[0_8px_24px_rgba(76,98,100,0.06)] relative overflow-hidden">
<!-- Decorative gradient orb -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary-fixed-dim/20 rounded-full blur-3xl pointer-events-none"></div>
<div class="mb-8 text-center relative z-10">
<h1 class="font-h2 text-h2 text-on-surface mb-2">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your Clink account securely.</p>
</div>
<form class="space-y-6 relative z-10">
<div class="space-y-2">
<label class="block font-caption text-caption text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined" style="font-size: 20px;">mail</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all duration-200" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-caption text-caption text-on-surface" for="password">Password</label>
<a class="font-caption text-caption text-primary hover:text-on-primary-container transition-colors duration-200" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined" style="font-size: 20px;">lock</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-button text-button py-3 px-4 rounded-lg hover:bg-[#3E7C7A] active:scale-[0.98] transition-all duration-200 flex justify-center items-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
<div class="mt-8 text-center relative z-10">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:text-on-primary-container transition-colors duration-200" href="#">Register</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full border-t border-[#2A3333]/10 mt-auto bg-stone-50 dark:bg-stone-950 flat py-12 px-8 flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto">

</div>
<div class="flex gap-6">
<a class="font-manrope text-xs uppercase tracking-widest text-stone-400 hover:text-[#5FA8A6] opacity-80 hover:opacity-100 transition-all" href="#">Privacy Policy</a>
<a class="font-manrope text-xs uppercase tracking-widest text-stone-400 hover:text-[#5FA8A6] opacity-80 hover:opacity-100 transition-all" href="#">Terms of Service</a>
<a class="font-manrope text-xs uppercase tracking-widest text-stone-400 hover:text-[#5FA8A6] opacity-80 hover:opacity-100 transition-all" href="#">Crisis Support</a>
<a class="font-manrope text-xs uppercase tracking-widest text-stone-400 hover:text-[#5FA8A6] opacity-80 hover:opacity-100 transition-all" href="#">Careers</a>
</div>
</footer>
